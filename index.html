<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>Telegram Mini App</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.0/dist/tonconnect-ui.min.js"></script>

    <style>
        body {
            font-family: Tahoma;
            padding: 20px;
        }

        button {
            width: 250px;
            height: 45px;
            margin-top: 10px;
            cursor: pointer;
        }

        #walletAddress {
            margin-top: 20px;
            word-break: break-all;
        }
    </style>
</head>
<body>

<h2>Telegram Mini App</h2>

<button id="connectBtn">
    Connect Wallet
</button>

<button id="payBtn" disabled>
    Pay 10 USDT
</button>

<div id="walletAddress"></div>

<script>

    const tg = window.Telegram.WebApp;
    tg.ready();

    let currentWallet = null;

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://var1366.github.io/test256.github.io/tonconnect-manifest.json'
    });

    async function saveWallet(address) {

        const token =
            localStorage.getItem("jwt");

        await fetch('/api/wallet/connect', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token
            },
            body: JSON.stringify({
                walletAddress: address
            })
        });
    }

    async function loadWallet() {

        await tonConnectUI.connectionRestored;

        if (tonConnectUI.wallet) {

            currentWallet =
                tonConnectUI.wallet.account.address;

            document.getElementById('walletAddress')
                .innerText =
                'Wallet: ' + currentWallet;

            document.getElementById('payBtn')
                .disabled = false;

            document.getElementById('connectBtn')
                .style.display = 'none';

            await saveWallet(currentWallet);
        }
    }

    document.getElementById('connectBtn')
        .onclick = async () => {

            const wallet =
                await tonConnectUI.connectWallet();

            currentWallet =
                wallet.account.address;

            document.getElementById('walletAddress')
                .innerText =
                'Wallet: ' + currentWallet;

            document.getElementById('payBtn')
                .disabled = false;

            document.getElementById('connectBtn')
                .style.display = 'none';

            await saveWallet(currentWallet);
        };

    document.getElementById('payBtn')
        .onclick = async () => {

            const token =
                localStorage.getItem("jwt");

            const response =
                await fetch(
                    '/api/payments/create',
                    {
                        method: 'POST',
                        headers: {
                            'Authorization':
                                'Bearer ' + token
                        }
                    });

            const payment =
                await response.json();

            alert(
                'Address : ' + payment.address +
                '\nMemo : ' + payment.memo +
                '\nAmount : 10 USDT'
            );

            // اینجا بعداً تراکنش USDT-TON را می‌سازیم
        };

    loadWallet();

</script>

</body>
</html>
