<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خرید اشتراک مینی‌اپ</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://unpkg.com/@tonconnect/ui@2.0.6/dist/tonconnect-ui.min.js"></script>

    <style>
        :root {
            --tg-theme-bg-color: #f4f7f6;
            --tg-theme-text-color: #222222;
            --tg-theme-button-color: #0088cc;
            --tg-theme-button-text-color: #ffffff;
        }

        body { 
            font-family: Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            padding: 30px 15px; 
            background-color: var(--tg-theme-bg-color); 
            color: var(--tg-theme-text-color);
            margin: 0;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
            font-size: 22px;
            color: #111;
        }

        p {
            font-size: 14px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 25px;
        }

        #ton-connect-btn { 
            display: inline-block; 
            margin-bottom: 15px;
        }

        .btn-pay { 
            width: 100%;
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold;
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            background-color: var(--tg-theme-button-color); 
            color: var(--tg-theme-button-text-color);
            display: none; /* در ابتدا مخفی است تا ولت وصل شود */
            transition: background 0.3s ease;
        }

        .btn-pay:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>خرید اشتراک ماهانه</h2>
        <p>برای دسترسی به تمامی امکانات مینی‌اپ، لطفاً اشتراک ماهانه را به مبلغ <strong>۱۰ تتر ($USDT$)</strong> فعال کنید.</p>

        <div id="ton-connect-btn"></div>

        <br>
        
        <button id="pay-button" class="btn-pay" onclick="sendPayment()">پرداخت ۱۰ تتر روی شبکه TON</button>
    </div>

    <script>
        // تعریف متغیر به صورت عمومی
        let tonConnectUI = null;

        // منتظر می‌مانیم تا کل صفحه و اسکریپت‌های CDN کاملاً بارگذاری شوند
        window.addEventListener('DOMContentLoaded', () => {
            
            // ۱. آماده‌سازی محیط مینی‌اپ تلگرام
            if (window.Telegram?.WebApp) {
                Telegram.WebApp.ready();
                Telegram.WebApp.expand(); // بزرگ کردن مینی‌اپ در صفحه گوشی
            }

            // ۲. پیدا کردن پکیج درستِ TON SDK (حل مشکل ارور رونمایی نسخه جدید)
            const TonSDK = window.TONConnectSDK || window.TONConnectUI;
            
            if (!TonSDK || !TonSDK.TonConnectUI) {
                console.error("خطا: کتابخانه TON Connect یافت نشد.");
                alert("مشکلی در بارگذاری متصل‌کننده بلاکچین رخ داده است. لطفاً صفحه را دوباره باز کنید.");
                return;
            }

            // ۳. مقداردهی اولیه TON Connect بدون خطا
            tonConnectUI = new TonSDK.TonConnectUI({
                manifestUrl: 'https://var1366.github.io/test256.github.io/tonconnect-manifest.json',
                buttonRootId: 'ton-connect-btn'
            });

            console.log("TON Connect با موفقیت کانفیگ شد.");

            // ۴. گوش دادن به وضعیت تغییرات کیف پول (وصل/قطع شدن)
            tonConnectUI.onStatusChange(wallet => {
                const payButton = document.getElementById('pay-button');
                if (payButton) {
                    if (wallet) {
                        // اگر کیف پول متصل بود، دکمه پرداخت را نمایش بده
                        payButton.style.display = 'block';
                    } else {
                        // اگر ولت قطع شد، دکمه پرداخت را مخفی کن
                        payButton.style.display = 'none';
                    }
                }
            });
        });

        // تابع ارسال تراکنش تتر به کیف پول
        async function sendPayment() {
            if (!tonConnectUI) return;

            // آدرس کیف پول اصلی سایت شما (برای دریافت درآمدها)
            const merchantAddress = "EQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM9c"; 

            // مقدار عددی ۱۰ تتر بر اساس نانو (تتر روی شبکه تون ۶ رقم اعشار دارد)
            // 10 * 10^6 = 10,000,000
            const amountInNano = "10000000"; 

            // ساخت بدنه تراکنش
            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360, // مدت اعتبار فاکتور (۶ دقیقه)
                messages: [
                    {
                        address: merchantAddress,
                        amount: "50000000", // حدود ۰.۰۵ تون‌کوین جهت تامین کارمزد جابجایی شبکه (Gas Fee)
                        // نکته فنی پروداکشن: برای ارسال دقیق خودِ توکن تتر (Jetton)، باید هگز دیتای 
                        // قرارداد هوشمند تتر به همراه Payload ارسال شود که در بسترهای درگاه این فیلد خودکار پر می‌شود.
                    }
                ]
            };

            try {
                // نمایش پاپ‌آپ ولت به کاربر جهت امضای تراکنش
                const result = await tonConnectUI.sendTransaction(transaction);
                
                // در صورت موفقیت، کد BOC (اطلاعات تراکنش) را به بک‌آند دات‌نت ارسال می‌کنیم
                verifyPaymentOnBackend(result.boc);

            } catch (error) {
                alert("عملیات پرداخت توسط کاربر لغو شد یا با خطا مواجه گردید.");
                console.error(error);
            }
        }

        // ارسال هش به سرور دات‌نت برای بررسی و فعال‌سازی اشتراک
        async function verifyPaymentOnBackend(boc) {
            try {
                // به دست آوردن آیدی عددی کاربر تلگرام به صورت امن
                const telegramUserId = window.Telegram?.WebApp?.initDataUnsafe?.user?.id || 0;

                const response = await fetch('https://yoursite.com/api/payment/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        telegramUserId: telegramUserId,
                        boc: boc
                    })
                });

                const data = await response.json();
                if (data.isSuccess) {
                    alert("با تشکر! اشتراک شما با موفقیت فعال شد.");
                    if (window.Telegram?.WebApp) {
                        Telegram.WebApp.close(); // بستن خودکار مینی‌اپ پس از خرید موفق
                    }
                } else {
                    alert("خطا در تایید تراکنش: " + data.message);
                }
            } catch (error) {
                alert("ارتباط با سرور برقرار نشد. تراکنش شما روی شبکه ثبت شده است.");
                console.error(error);
            }
        }
    </script>
</body>
</html>
