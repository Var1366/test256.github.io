<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Membership</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@2.0.0/dist/tonconnect-ui.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 30px;
        }

        .card {
            max-width: 450px;
            margin: auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .price {
            font-size: 26px;
            color: #38bdf8;
            margin-bottom: 30px;
        }

        button {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }

        #payBtn {
            background: #10b981;
            color: white;
        }

        #payBtn:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        #status {
            margin-top: 20px;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Premium Membership</h1>

    <div class="price">
        Membership Price: 10 USDT
    </div>

    <div id="ton-connect"></div>

    <button id="payBtn" disabled>
        Pay 10 USDT
    </button>

    <div id="status"></div>
</div>

<script>
    Telegram.WebApp.ready();
    Telegram.WebApp.expand();

    const status = document.getElementById("status");
    const payBtn = document.getElementById("payBtn");

    let walletAddress = null;

    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: "https://var1366.github.io/test256.github.io/tonconnect-manifest.json",
        buttonRootId: "ton-connect"
    });


    tonConnectUI.onStatusChange(wallet => {
        if (!wallet)
            return;

        walletAddress = wallet.account.address;

        payBtn.disabled = false;

        status.innerHTML = "Wallet Connected<br>" + walletAddress;
    });

    payBtn.addEventListener("click", async () => {

        try {

            payBtn.disabled = true;
            status.innerHTML = "Waiting for payment...";

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [
                    {
                        address: "TBa3NZmemmM5rUpbpeVjFnUvJeHKn9fAoP",
                        amount:  "10000000"
                    }
                ]
            };

            const result = await tonConnectUI.sendTransaction(transaction);

            const telegramUser = Telegram.WebApp.initDataUnsafe.user;

            const response = await fetch( "/api/payment/confirm",
                {
                    method: "POST",
                    headers: {
                        "Content-Type":"application/json"
                    },
                    body: JSON.stringify({
                        telegramUserId: telegramUser.id,

                        userName:telegramUser.username,

                        walletAddress: walletAddress,

                        transactionHash: result.boc
                    })
                }
            );

            const data = await response.json();

            if (data.success) {
                status.innerHTML = "✅ Membership Activated";
            }
            else {
                status.innerHTML = "❌ Payment Failed";
            }

        }
        catch (e) {

            console.log(e);

            status.innerHTML = "❌ Payment Cancelled";

            payBtn.disabled = false;
        }
    });
</script>

</body>
</html>
