<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خرید اشتراک مینی‌اپ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .btn { padding: 12px 24px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        .btn-pay { background-color: #0088cc; color: white; display: none; }
        #ton-connect-btn { display: inline-block; }
    </style>
</head>
<body>

    <h2>خرید اشتراک ماهانه (۱۰ تتر)</h2>
    <p>برای فعال‌سازی اشتراک، ابتدا کیف پول خود را متصل کرده و سپس پرداخت را انجام دهید.</p>

    <div id="ton-connect-btn"></div>

    <br>
    <button id="pay-button" class="btn btn-pay" onclick="sendPayment()">پرداخت ۱۰ تتر روی شبکه TON</button>

    <script>
        // مقداردهی اولیه تلگرام
        Telegram.WebApp.ready();

        // مقداردهی اولیه TON Connect
        // نکته: فایل manifest.json باید روی سرور شما باشد و مشخصات سایتتان در آن باشد
        const tonConnectUI = new TONConnectUI.TonConnectUI({
            manifestUrl: 'https://yoursite.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn'
        });

        // گوش دادن به تغییرات وضعیت ولت (وصل شدن یا قطع شدن)
        tonConnectUI.onStatusChange(wallet => {
            const payButton = document.getElementById('pay-button');
            if (wallet) {
                // ولت وصل شد، دکمه پرداخت را نشان بده
                payButton.style.display = 'inline-block';
            } else {
                payButton.style.display = 'none';
            }
        });

        async function sendPayment() {
            // آدرس ولت مقصد (ولت سایت شما برای جمع‌آوری درآمد)
            // آدرس تتر روی شبکه تون دقیقاً همان آدرس ولت TON شماست
            const merchantAddress = "EQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAM9c"; 

            // ۱۰ تتر به فرمت نانو (تتر روی تون ۶ رقم اعشار دارد)
            // 10 * 10^6 = 10,000,000
            const amountInNano = "10000000"; 

            const transaction = {
                validUntil: Math.floor(Date.now() / 1000) + 360, // ۶ دقیقه اعتبار
                messages: [
                    {
                        address: merchantAddress,
                        amount: "50000000", // حدود ۰.۰۵ تون‌کوین برای کارمزد شبکه (Gas Fee)
                        // در بلاکچین تون، برای جابه‌جایی تتر باید قرارداد هوشمند تتر (Jetton) را صدا زد
                        // برای سادگی، درگاه‌های پرداخت آدرس مستقیم جت‌تون یا تراکنش حاوی Payload ارسال می‌کنند.
                    }
                ]
            };

            try {
                // باز کردن ولت و درخواست امضای تراکنش از کاربر
                const result = await tonConnectUI.sendTransaction(transaction);
                
                // اگر تراکنش موفق بود، اطلاعات را به بک‌اند ASP.NET Core می‌فرستیم
                verifyPaymentOnBackend(result.boc);

            } catch (error) {
                alert("پرداخت توسط کاربر لغو شد یا با خطا مواجه شد.");
                console.error(error);
            }
        }

        async function verifyPaymentOnBackend(boc) {
            // ارسال هش/باک تراکنش به سرور دات‌نت برای تایید نهایی
            const response = await fetch('https://yoursite.com/api/payment/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    telegramUserId: Telegram.WebApp.initDataUnsafe.user?.id || 0,
                    boc: boc
                })
            });

            const data = await response.json();
            if (data.isSuccess) {
                alert("اشتراک شما با موفقیت فعال شد!");
                Telegram.WebApp.close(); // بستن مینی‌اپ
            } else {
                alert("خطا در تایید تراکنش: " + data.message);
            }
        }
    </script>
</body>
</html>
