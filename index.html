<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Telegram Mini App</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<h2>Loading...</h2>

<script>

const tg = window.Telegram.WebApp;

tg.ready();

(async () => {

    try {

        const response = await fetch(
            "https://localhost:7286/api/TelegramAuth/telegram",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    initData: tg.initData
                })
            });

        if (!response.ok) {
            document.body.innerHTML =
                "<h2>Authentication Failed</h2>";
            return;
        }

        const result =
            await response.json();

        document.body.innerHTML =
            `<h2>Welcome ${result.firstName}</h2>`;

        console.log(result);

    }
    catch (error) {

        console.error(error);

        document.body.innerHTML =
            "<h2>Server Error</h2>";
    }

})();
</script>

</body>
</html>
